<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skill Tree Clicker</title>
    <style>
        :root { --bg: #0f172a; --gold: #f59e0b; --locked: #334155; --unlocked: #1e293b; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        /* Main Screen */
        #game-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #stats { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 15px; border: 1px solid #444; }
        .big-count { font-size: 3rem; color: var(--gold); font-weight: bold; }
        #cookie { font-size: 150px; cursor: pointer; transition: 0.1s; user-select: none; }
        #cookie:active { transform: scale(0.9); }

        /* Skill Tree Overlay */
        #tree-overlay { 
            position: fixed; inset: 0; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); 
            display: none; z-index: 1000; overflow: auto; padding: 100px;
        }
        .tree-wrapper { position: relative; width: 800px; margin: 0 auto; height: 1200px; }
        
        /* SVG Lines */
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        line { stroke: #475569; stroke-width: 4; stroke-linecap: round; }
        line.active { stroke: var(--gold); }

        /* Nodes */
        .node { 
            position: absolute; width: 140px; height: 140px; background: var(--locked);
            border: 4px solid #475569; border-radius: 50%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; font-size: 0.8rem;
            cursor: pointer; transition: 0.3s; transform: translateX(-50%);
        }
        .node.available { background: var(--unlocked); border-color: #94a3b8; }
        .node.purchased { background: #065f46; border-color: var(--gold); box-shadow: 0 0 20px rgba(245, 158, 11, 0.3); }
        .node:hover:not(.locked) { transform: translateX(-50%) scale(1.1); z-index: 10; }
        
        .node-icon { font-size: 2rem; margin-bottom: 5px; }
        .price { color: var(--gold); font-weight: bold; }

        .btn-ui { padding: 15px 30px; background: var(--gold); color: black; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        .close-btn { position: fixed; top: 20px; right: 20px; background: #ef4444; }
    </style>
</head>
<body>

    <div id="game-view">
        <div id="stats">
            <div>Cookies: <span class="big-count" id="count">0</span></div>
            <div>CPS: <span id="cps">0</span></div>
        </div>
        <div id="cookie">🍪</div>
        <button class="btn-ui" style="margin-top: 50px;" onclick="toggleTree()">OPEN SKILL TREE</button>
    </div>

    <div id="tree-overlay">
        <button class="btn-ui close-btn" onclick="toggleTree()">CLOSE TREE</button>
        <div class="tree-wrapper">
            <svg id="tree-svg"></svg>
            
            <!-- Tier 1 -->
            <div id="node-cursor" class="node available" style="top: 0; left: 50%;" onclick="buy('cursor')">
                <span class="node-icon">🖱️</span>
                <strong>Cursor</strong>
                <span class="price" id="cost-cursor">15</span>
                <div id="own-cursor">Owned: 0</div>
            </div>

            <!-- Tier 2 -->
            <div id="node-grandma" class="node locked" style="top: 300px; left: 30%;" onclick="buy('grandma')">
                <span class="node-icon">👵</span>
                <strong>Grandma</strong>
                <span class="price" id="cost-grandma">100</span>
                <div id="own-grandma">Owned: 0</div>
            </div>

            <div id="node-clicker" class="node locked" style="top: 300px; left: 70%;" onclick="buy('clicker')">
                <span class="node-icon">⚡</span>
                <strong>Mega Click</strong>
                <span class="price" id="cost-clicker">200</span>
                <div id="own-clicker">Owned: 0</div>
            </div>

            <!-- Tier 3 -->
            <div id="node-factory" class="node locked" style="top: 600px; left: 50%;" onclick="buy('factory')">
                <span class="node-icon">🏭</span>
                <strong>Factory</strong>
                <span class="price" id="cost-factory">1000</span>
                <div id="own-factory">Owned: 0</div>
            </div>
        </div>
    </div>

    <script>
        let game = {
            cookies: 0, cps: 0,
            upgrades: {
                cursor: { cost: 15, power: 1, count: 0, req: null, x: 50, y: 0 },
                grandma: { cost: 100, power: 5, count: 0, req: 'cursor', x: 30, y: 300 },
                clicker: { cost: 200, power: 10, count: 0, req: 'cursor', x: 70, y: 300 },
                factory: { cost: 1000, power: 50, count: 0, req: 'grandma', x: 50, y: 600 }
            }
        };

        function toggleTree() {
            const tree = document.getElementById('tree-overlay');
            tree.style.display = tree.style.display === 'block' ? 'none' : 'block';
            if(tree.style.display === 'block') drawLines();
        }

        function buy(id) {
            const up = game.upgrades[id];
            if (up.req && game.upgrades[up.req].count === 0) return;
            if (game.cookies >= up.cost) {
                game.cookies -= up.cost;
                up.count++;
                game.cps += up.power;
                up.cost = Math.round(up.cost * 1.3);
                update();
                drawLines();
            }
        }

        function drawLines() {
            const svg = document.getElementById('tree-svg');
            svg.innerHTML = '';
            for (let id in game.upgrades) {
                const up = game.upgrades[id];
                if (up.req) {
                    const parent = game.upgrades[up.req];
                    const line = document.createElementNS("http://www.w3.org", "line");
                    line.setAttribute("x1", `${parent.x}%`);
                    line.setAttribute("y1", `${parent.y + 70}px`);
                    line.setAttribute("x2", `${up.x}%`);
                    line.setAttribute("y2", `${up.y + 70}px`);
                    if (parent.count > 0) line.classList.add('active');
                    svg.appendChild(line);
                }
            }
        }

        function update() {
            document.getElementById('count').innerText = Math.floor(game.cookies);
            document.getElementById('cps').innerText = game.cps;
            
            for (let id in game.upgrades) {
                const up = game.upgrades[id];
                const el = document.getElementById(`node-${id}`);
                document.getElementById(`cost-${id}`).innerText = up.cost;
                document.getElementById(`own-${id}`).innerText = "Owned: " + up.count;

                if (up.count > 0) el.className = 'node purchased';
                else if (!up.req || game.upgrades[up.req].count > 0) el.className = 'node available';
                else el.className = 'node locked';
            }
        }

        document.getElementById('cookie').onclick = () => { game.cookies++; update(); };
        setInterval(() => { game.cookies += game.cps/10; update(); }, 100);
        window.addEventListener('resize', drawLines);
        update();
    </script>
</body>
</html>
